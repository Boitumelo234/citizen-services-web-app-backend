spring.application.name=citizen-services-web-app-backend

# Server
server.port=${SERVER_PORT:8080}

# MySQL
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:citizen_services_db}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# CORS
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:3000}

