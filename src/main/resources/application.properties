spring.application.name=citizen-services-web-app-backend

# Server
server.port=${SERVER_PORT:8080}

# MySQL
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:citizen_services_db}?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:3001}

jwt.secret=Z3Jhdml0eS1pcy1hLXNlY3VyZS1rZXktZm9yLUhTNTEyLWFuZC1zcHJpbmctYm9vdC1hcHBsaWNhdGlvbnM=

# Admin email (only this email becomes ADMIN)
admin.email=admin@example.com
admin.password=admin@123

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads
spring.servlet.multipart.enabled=true
